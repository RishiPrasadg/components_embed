<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoga Everyday - Membership</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

body {
  background: linear-gradient(to bottom, rgba(221,244,255,0.5), rgba(161,217,205,0.5));
}

.back-wrapper { padding: 20px 40px; cursor: pointer; font-size: 26px; }

.page-title { text-align: center; margin-top: 10px; }
.page-title h1 { font-size: 48px; font-weight: 600; }
.page-title span { display: block; color: #046E75; font-weight: 800; }

.main-wrapper {
  display: flex;
  justify-content: center;
  gap: 60px;
  padding: 40px;
  flex-wrap: wrap;
}

.left-section, .right-section { width: 420px; }

.plan-card {
  background: #fff;
  border-radius: 10px;
  padding: 20px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

.plan-top { display: flex; gap: 20px; align-items: center; }
.plan-top img { width: 130px; }

.plan-info h2 { font-size: 36px; font-weight: 800; }

.strike { text-decoration: line-through; color: #464646; font-weight: 600; }
.discount {
  background: #E23232;
  color: white;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 14px;
  margin-left: 10px;
}

.price { font-size: 48px; font-weight: 800; color: #046E75; margin-top: 10px; }

.feature-box {
  background: #fff;
  margin-top: 20px;
  border-radius: 10px;
  padding: 20px;
}

.feature-box p { margin-bottom: 10px; color: #565656; font-weight: 500; }
.feature-box strong { color: #046E75; }

.payment-card {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

label { font-weight: 600; font-size: 14px; }

.phone-wrapper {
  border: 2px solid #AAAAAA;
  border-radius: 8px;
  display: flex;
  align-items: center;
  padding: 8px 12px;
  margin-top: 6px;
}

.phone-wrapper input {
  border: none;
  outline: none;
  flex: 1;
  font-size: 16px;
}

.pay-btn {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  background: #0F4B80;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}

.pay-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.powered {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-top: 15px;
  font-weight: 600;
  color: #666;
}

@media(max-width: 768px) {
  .page-title h1 { font-size: 28px; }
  .main-wrapper { flex-direction: column-reverse; padding: 20px; }
  .left-section, .right-section { width: 100%; }
  .plan-top img { width: 90px; }
  .price { font-size: 32px; }
}
</style>
</head>

<body>

<div class="back-wrapper" onclick="window.history.back()">←</div>

<div class="page-title">
  <h1>
    Yoga Everyday
    <span id="membershipDuration"></span>
  </h1>
</div>

<div class="main-wrapper">

  <!-- LEFT -->
  <div class="left-section">

    <div class="plan-card">
      <div class="plan-top">
        <img src="https://assets.habit.yoga/habuildassets/SB_PAYMENT.webp" alt="Yoga">
        <div class="plan-info">
          <h2 id="planName"></h2>
          <div>
            <span class="strike" id="originalPrice"></span>
            <span class="discount" id="discountBadge"></span>
          </div>
          <div class="price" id="finalPrice"></div>
        </div>
      </div>
    </div>

    <div class="feature-box">
      <p id="planDescription"></p>
      <div id="featureList"></div>

      <br>
      <strong>Contact Us:</strong><br>
      yogaeveryday@habuild.in<br>
      +91 712-6924545
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right-section">

    <div class="payment-card">
      <h3>Please fill in the below information</h3>

      <form id="paymentForm">
        <label>WhatsApp Number *</label>

        <div class="phone-wrapper">
          🇮🇳 +91
          <input type="tel" id="phone" placeholder="Enter WhatsApp Number" required>
        </div>

        <button type="submit" class="pay-btn" id="payButton" disabled>
          Loading...
        </button>
      </form>

      <div class="powered">
        Powered By
        <img src="https://assets.habit.yoga/habuildassets/HDFC_Bank_Logo.svg" width="120">
      </div>
    </div>

  </div>

</div>

<script>

const API_URL = "https://payment-service.habuild.in/plan/?status=ACTIVE&type=STANDARD";
let selectedPlanId = null;

function getPlanId() {
  const params = new URLSearchParams(window.location.search);
  return parseInt(params.get("planId"));
}

async function loadPaymentPage() {
  const planId = getPlanId();
  if (!planId) {
    alert("Invalid plan selected.");
    return;
  }

  selectedPlanId = planId;

  const res = await fetch(API_URL);
  const resp = await res.json();

  if (!resp.success) {
    alert("Failed to load plans.");
    return;
  }

  const data = resp.data;
  const isInternational = data.is_international;
  const country = data.country;

  const plans = Object.entries(data)
    .filter(([key]) => !isNaN(key))
    .map(([, plan]) => plan);

  const plan = plans.find(p => p.id === planId);
  if (!plan) {
    alert("Plan not found.");
    return;
  }

  renderPlan(plan, isInternational, country);
}

function renderPlan(plan, isInternational, country) {

  const regionKey = isInternational ? "USA" : (country || "IND");
  const region = plan.regions[regionKey] || plan.regions["IND"];

  const amount = region.amount / 100;
  const original = region.discounted_amount;
  const discount = original > 0
    ? Math.round(((original - amount) / original) * 100)
    : 0;

  document.title = `Yoga Everyday - ${plan.name} Membership`;
  document.getElementById("membershipDuration").innerText = `${plan.name} Membership`;
  document.getElementById("planName").innerText = plan.name;
  document.getElementById("originalPrice").innerText = `₹ ${original}/-`;
  document.getElementById("discountBadge").innerText = `-${discount}% Off`;
  document.getElementById("finalPrice").innerText = `₹ ${amount}/-`;
  document.getElementById("payButton").innerText = `Click here to pay ₹ ${amount}`;
  document.getElementById("payButton").disabled = false;

  document.getElementById("planDescription").innerHTML =
    `You've selected the <strong>${plan.name} Plan</strong>`;

  const featuresHTML = plan.features.features
    .filter(f => f.status)
    .map(f => `<p>✅ ${f.text}${f.desc ? " " + f.desc : ""}</p>`)
    .join("");

  document.getElementById("featureList").innerHTML = featuresHTML;
}

document.getElementById("paymentForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const phone = document.getElementById("phone").value.trim();

  if (!/^[0-9]{10}$/.test(phone)) {
    alert("Please enter valid 10 digit mobile number");
    return;
  }

  const payBtn = document.getElementById("payButton");
  payBtn.disabled = true;
  payBtn.innerText = "Processing...";

  try {
    const response = await fetch("https://your-backend-domain.com/create-order", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        planId: selectedPlanId,
        phone: phone
      })
    });

    const data = await response.json();

    if (!data.success) {
      alert("Order creation failed.");
      payBtn.disabled = false;
      return;
    }

    // Open Razorpay here using data.orderId
    alert("Order created successfully. Integrate Razorpay here.");

  } catch (err) {
    alert("Something went wrong.");
    payBtn.disabled = false;
  }
});

loadPaymentPage();

</script>

</body>
</html>s
